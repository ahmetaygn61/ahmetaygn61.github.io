<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(#11998e 0%, #38ef7d 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
            min-height: 50px;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 2rem 1rem;
            font-size: 14px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            transition: all 0.2s;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .task-item:hover {
            background: #efefef;
        }
        
        .task-item.completed {
            opacity: 0.6;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .task-text {
            flex: 1;
            color: #333;
            font-size: 15px;
        }
        
        .btn-delete {
            padding: 6px 12px;
            background: #ff6b6b;
            font-size: 12px;
            margin: 0;
        }
        
        .stats {
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            text-align: center;
            color: #666;
            font-size: 13px;
        }
        
        .stat {
            flex: 1;
        }
        
        .stat-number {
            display: block;
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✓ Yapılacaklar</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Yeni görev ekle..." />
            <button onclick="addTask()">Ekle</button>
        </div>
        
        <div class="task-list" id="taskList">
            <div class="empty-state">Henüz görev yok. Başlayalım! 🚀</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="totalTasks">0</span>
                <span>Toplam</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completedTasks">0</span>
                <span>Tamamlandı</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="remainingTasks">0</span>
                <span>Kalan</span>
            </div>
        </div>
    </div>
    
    <script>
        // localStorage kullanarak görevleri saklıyoruz
        const STORAGE_KEY = 'tasks-app';
        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let taskIdCounter = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
        
        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }
        
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            
            if (!text) {
                alert('Görev yazınız!');
                return;
            }
            
            const task = {
                id: taskIdCounter++,
                text: text,
                completed: false
            };
            
            tasks.push(task);
            saveTasks();
            input.value = '';
            renderTasks();
        }
        
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }
        
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                list.innerHTML = '<div class="empty-state">Henüz görev yok. Başlayalım! 🚀</div>';
            } else {
                list.innerHTML = tasks.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask(${task.id})" />
                        <span class="task-text">${task.text}</span>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">Sil</button>
                    </div>
                `).join('');
            }
            
            const completed = tasks.filter(t => t.completed).length;
            const remaining = tasks.length - completed;
            
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('remainingTasks').textContent = remaining;
        }
        
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });
        
        renderTasks();
    </script>
</body>
</html>
